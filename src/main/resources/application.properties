# =====================================================================
#  CSV Batch Processor - Configuration principale
# =====================================================================

# --- Base de données PostgreSQL ---
db.url=jdbc:postgresql://localhost:5432/batch_db
db.username=postgres
db.password=postgres

# --- Pool de connexions HikariCP ---
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.connectionTimeout=30000

# --- Répertoires de traitement ---
# Dossier surveillé pour les fichiers entrants
batch.input.dir=input
# Dossier de destination après traitement réussi
batch.processed.dir=processed
# Dossier de destination en cas d'erreur
batch.error.dir=error
